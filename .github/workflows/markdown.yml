name: Markdown
on:
  push:
    branches:
      - master
    paths:
      - "**.md"
      - .github/workflows/markdown.yml
  pull_request:
    paths:
      - "**.md"
      - .github/workflows/markdown.yml

jobs:
  markdown:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: DavidAnson/markdownlint-cli2-action@6b51ade7a9e4a75a7ad929842dd298a3804ebe8b # v23.1.0
        with:
          globs: "**.md"
          config: .markdownlint.json

      - uses: reviewdog/action-misspell@bd39f95716e0fdb83f709fdd49666bd466663f56 # v1.9.0
        with:
          locale: "US"
          level: error
          pattern: |
            *.md

      - uses: gaurav-nelson/github-action-markdown-link-check@5c5dfc0ac2e225883c0e5f03a85311ec2830d368 # v1
        with:
          use-quiet-mode: yes
          config-file: .github/workflows/configs/mlc-config.json

      - uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        if: github.repository == 'qdm12/ddns-updater' && github.event_name == 'push'
        with:
          username: qmcgaw
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: qmcgaw/ddns-updater
          short-description: Container to update DNS records periodically with WebUI for many DNS providers
          readme-filepath: README.md
          enable-url-completion: true
